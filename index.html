<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PRO Wallet</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {font-family: Arial; margin:0; background:#0f172a; color:white; direction:rtl;}
.box {max-width:420px; margin:40px auto; background:#111827; padding:20px; border-radius:15px;}
input,button {width:100%; padding:12px; margin:6px 0; border-radius:8px; border:none;}
button {cursor:pointer;}
.green{background:#22c55e;}
.blue{background:#3b82f6;}
.red{background:#ef4444;}
.top{padding:15px; text-align:center; background:#000;}
</style>
</head>

<body>

<div class="top">🏦 PRO FINTECH WALLET</div>

<div class="box">

<!-- AUTH -->
<div id="authBox">
<h3>تسجيل الدخول</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button class="blue" onclick="login()">Login</button>
<button class="green" onclick="register()">Register</button>
</div>

<!-- APP -->
<div id="appBox" style="display:none;">
<h3>👤 <span id="user"></span></h3>
<h2>💰 <span id="balance">0</span>$</h2>

<input id="to" placeholder="إيميل المستلم">
<input id="amount" placeholder="المبلغ">

<button class="green" onclick="send()">إرسال أموال</button>
<button class="red" onclick="logout()">خروج</button>

<p id="msg"></p>
</div>

</div>

<script>
/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

/* 🔐 AUTH */
auth.onAuthStateChanged(async user => {
  if (!user) return;

  currentUser = user;

  authBox.style.display = "none";
  appBox.style.display = "block";

  user.innerText = user.email;

  let ref = db.collection("users").doc(user.uid);
  let doc = await ref.get();

  if (!doc.exists) {
    await ref.set({
      email: user.email,
      balance: 1000
    });
  }

  loadBalance();
});

/* 📊 BALANCE */
async function loadBalance(){
  let doc = await db.collection("users").doc(currentUser.uid).get();
  balance.innerText = doc.data().balance;
}

/* 🔐 REGISTER */
function register(){
  auth.createUserWithEmailAndPassword(email.value, pass.value);
}

/* 🔐 LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value);
}

/* 💸 TRANSFER (PRO LOGIC) */
async function send(){

  msg.innerText = "جاري التحويل...";

  let amountVal = Number(amount.value);

  let senderRef = db.collection("users").doc(currentUser.uid);
  let sender = await senderRef.get();

  let receiver = await db.collection("users")
    .where("email","==",to.value)
    .get();

  if (receiver.empty){
    msg.innerText = "المستخدم غير موجود";
    return;
  }

  let receiverRef = receiver.docs[0].ref;

  await db.runTransaction(async (t)=>{

    let s = await t.get(senderRef);
    let r = await t.get(receiverRef);

    if (s.data().balance < amountVal){
      throw "رصيد غير كافي";
    }

    t.update(senderRef,{
      balance: s.data().balance - amountVal
    });

    t.update(receiverRef,{
      balance: r.data().balance + amountVal
    });

  });

  msg.innerText = "تم التحويل بنجاح ✅";
  loadBalance();
}

/* 🚪 LOGOUT */
function logout(){
  auth.signOut();
  location.reload();
}
</script>

</body>
</html>
